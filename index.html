const PAY_PERIODS=['Jan 25','Feb 08','Feb 22','Mar 08','Mar 22','Apr 05','Apr 19','May 03'];
const RATE_TABLE={
  'Coach':  [{lo:0,hi:34,r:40.50},{lo:35,hi:39,r:46.00},{lo:40,hi:44,r:61.50},{lo:45,hi:54,r:65.00},{lo:55,hi:64,r:69.00},{lo:65,hi:Infinity,r:72.50}],

};
function getSessionRate(tier,sess){
  const t=RATE_TABLE[tier]||RATE_TABLE['Coach'];
  return (t.find(b=>Math.floor(sess)<=b.hi)||t[t.length-1]).r;
}
function getNextRate(tier,sess){
  const t=RATE_TABLE[tier]||RATE_TABLE['Coach'];
  const s=Math.floor(sess);
  const idx=t.findIndex(b=>s<=b.hi);
  if(idx<0||idx>=t.length-1)return null;
  return {rate:t[idx+1].r,at:t[idx+1].lo,remaining:t[idx+1].lo-s,currentLo:t[idx].lo,currentHi:t[idx].hi};
}
function calcPay(tier,sess,eq,cpt){
  const r=getSessionRate(tier,sess);
  return {rate:r,pay:Math.round((sess||0)*r+((eq||0)*25)+((cpt||0)*25))};
}

// ─── DATA GENERATOR ──────────────────────────
let _s=42; const rand=()=>{_s=(_s*9301+49297)%233280;return _s/233280;};
const noise=()=>0.82+rand()*0.36;
const PROFILES={excellent:1.28,good:1.02,average:0.76,struggling:0.44};

function mkCoach(id,name,club,stage,tier,ho,profile){
  const b=BENCHMARKS[stage], m=PROFILES[profile]||1;
  const hist=Array.from({length:8},(_,wi)=>{
    const wm=m*(0.78+wi*0.03)*noise();
    return {wk:'W'+(wi+1),
      eq_b:Math.round(b.eq_b*wm), eq_c:Math.round(Math.max(b.eq_c,1)*wm),
      cpt:Math.round(Math.max(b.cpts,1)*wm), sess:Math.round(Math.max(b.sess,1)*wm),
      conv:Math.round(Math.max(b.ac,1)*0.35*wm), fu:Math.round(Math.max(b.fu,1)*wm),
      rev:Math.round(b.rev*wm)};
  });
  const L=hist[7],P=hist[6];
  const si=RAMP_STAGES.indexOf(stage);
  const ac=Math.round(Math.max(b.ac,0)*m*1.1+si*1.5*m);
  const rc=Math.round(ac*Math.min(b.rec_pct*m*1.1,0.95));
  return {id,name,club,region:REGIONS[club],ptm:PTMS[club],tier,ramp_stage:stage,
    hire_date:'2025-'+String(12-ho).padStart(2,'0')+'-01',hist,
    eq_b:L.eq_b, eq_c:L.eq_c, cpt:L.cpt, sess:L.sess, conv:L.conv, fu:L.fu, rev:L.rev,
    monthly_rev:L.rev*4, ac, rc, rec_pct:ac>0?rc/ac:0,
    retention:Math.min(.99,.72+m*.22), confirm:Math.min(.99,.76+m*.18),
    cal_util:Math.min(.99,.62+m*.26), pkg:Math.round((800+si*150)*m),
    eq_conv:L.eq_b>0?Math.min(.95,(L.eq_c/L.eq_b)*(.7+m*.25)):0,
    cpt_rate:L.eq_c>0?Math.min(.9,(L.cpt/L.eq_c)*(.6+m*.3)):0,
    rev_trend:L.rev-P.rev, self_assess:null};
}

// ─── SCORING ─────────────────────────────────
const cap=(v,max,fl=0)=>Math.min(100,Math.max(fl,(v/Math.max(max,.01))*100));

function scoreProd(c){
  const b=BENCHMARKS[c.ramp_stage];
  return Math.round(cap(c.monthly_rev,b.rev*4)*.45+(b.ac>0?cap(c.ac,b.ac,10):70)*.30+(b.sess>0?cap(c.sess,b.sess,10):70)*.25);
}
function scoreProc(c){
  const b=BENCHMARKS[c.ramp_stage];
  return Math.round((b.eq_c>0?cap(c.eq_c,b.eq_c,5):70)*.40+(b.cpts>0?cap(c.cpt,b.cpts,5):70)*.35+cap(c.fu,Math.max(b.fu,1),5)*.25);
}
function scorePers(c){
  const b=BENCHMARKS[c.ramp_stage];
  return Math.round((b.rec_pct>0?cap(c.rec_pct,b.rec_pct*1.2,10):65)*.45+c.retention*100*.30+c.confirm*100*.25);
}
function riskOf(c){
  const b=BENCHMARKS[c.ramp_stage];
  if(c.eq_c===0&&c.ramp_stage!=='Week 1') return 'Red';
  if(c.conv===0&&RAMP_STAGES.indexOf(c.ramp_stage)>=2) return 'Red';
  if(c.monthly_rev<b.rev*4*.6) return 'Red';
  if(b.rec_pct>0&&c.rec_pct<b.rec_pct*.7) return 'Yellow';
  if(c.confirm<.80) return 'Yellow';
  if(c.eq_b<b.eq_b*.7) return 'Yellow';
  return 'Green';
}
function enrich(c){
  const prod=scoreProd(c),proc=scoreProc(c),pers=scorePers(c);
  const rev=c.rev!=null?c.rev:Math.round((c.monthly_rev||0)/2);
  const rev_trend=c.rev_trend!=null?c.rev_trend:0;
  return {...c,prod,proc,pers,score:Math.round(prod*.5+proc*.3+pers*.2),risk:riskOf(c),rev,rev_trend};
}
const COACHES=RAW.map(enrich);

// ─── DIAGNOSIS / RECOMMENDATIONS ─────────────
function diagnose(c){
  const hi=s=>s>=72,lo=s=>s<55,{prod:prod,proc:proc,pers:pers}=c;
  if(hi(prod)&&hi(proc)&&hi(pers)) return {label:'On Track',        col:'green',txt:'All three pillars at or above target. Sustain habits and scale volume.'};
  if(hi(proc)&&lo(prod))            return {label:'Conversion Gap',  col:'amber',txt:'Activity is strong but production is lagging — likely a close quality or Equifit-to-CPT conversion issue.'};
  if(lo(proc)&&lo(prod))            return {label:'Pipeline Priority',col:'red',  txt:'Both activity and output are below target. Primary driver is pipeline generation and daily lead-building.'};
  if(hi(prod)&&lo(pers))            return {label:'Retention Risk',  col:'amber',txt:'Strong production but client stability is fragile. Recurring scheduling and retention conversations are the priority.'};
  if(hi(pers)&&lo(prod))            return {label:'Volume Gap',      col:'amber',txt:'Client base is stable but volume and acquisition need support. Focus on referral and prospecting systems.'};
  if(lo(proc))                       return {label:'Activity Deficit',col:'amber',txt:'Process behaviors below benchmark. Build Equifit cadence and follow-up consistency before chasing production.'};
  return {label:'Developing',col:'gray',txt:'Early ramp phase. Build habits and establish baseline expectations.'};
}
function recommend(c){
  const b=BENCHMARKS[c.ramp_stage];
  const wins=[],opps=[],focs=[],acts=[];
  if(c.eq_c>=b.eq_c) wins.push('Equifit cadence at or above benchmark');
  if(c.ac>=b.ac) wins.push('Active client count on pace');
  if(b.rec_pct>0&&c.rec_pct>=b.rec_pct) wins.push('Recurring rate meeting target');
  if(c.monthly_rev>=b.rev*4*.9) wins.push('Revenue pace within target range');
  if(c.confirm>=.90) wins.push('High session confirmation rate');
  if(!wins.length) wins.push('Showing up and building baseline habits');
  if(c.eq_c<b.eq_c){opps.push('Equifit volume below target');focs.push('Equifit completion cadence');acts.push('Set daily floor conversation targets. Review booking approach.');}
  if(b.cpts>0&&c.cpt<b.cpts){opps.push('CPT close rate below benchmark');focs.push('Equifit-to-CPT conversion');acts.push('Role-play CPT close script. Review consultation structure.');}
  if(c.fu<b.fu){opps.push('Follow-up volume low');focs.push('Pipeline follow-up cadence');acts.push('Build a daily follow-up block. Set minimum outreach targets.');}
  if(b.rec_pct>0&&c.rec_pct<b.rec_pct*.8){opps.push('Recurring % below stage benchmark');focs.push('Recurring scheduling systems');acts.push('Audit current client scheduling. Introduce recurring language.');}
  if(c.monthly_rev<b.rev*4*.75){opps.push('Revenue pacing below threshold');focs.push('Package optimization');acts.push('Review avg package size vs benchmark. Coach on value communication.');}
  if(c.confirm<.82){opps.push('Session confirmation below 80%');focs.push('Calendar and professionalism');acts.push('Implement 24-hour session confirmation. Review no-show recovery.');}
  if(!opps.length) opps.push('No critical gaps — focus on scaling volume');
  return {wins,opps,focus:focs[0]||'Sustain current performance',action:acts[0]||'Identify the next scaling opportunity.'};
}

const sl=s=>s>=80?'Strong':s>=60?'On Pace':'Needs Attention';
const rd=r=>({Green:'#16A34A',Yellow:'#D97706',Red:'#DC2626'}[r]||'#9CA3AF');
const ini=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const abg=n=>['#F3F4F6','#DBEAFE','#D1FAE5','#FEF3C7','#EDE9FE','#FEE2E2'][n.charCodeAt(0)%6];
const atx=n=>['#374151','#1D4ED8','#065F46','#92400E','#5B21B6','#991B1B'][n.charCodeAt(0)%6];

// ─── SVG CHARTS ──────────────────────────────
function SvgLine({data,keys,colors,h=180,labels}){
  const w=560,pad={t:10,r:10,b:28,l:36};
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const allVals=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allVals,1)*1.1;
  const x=i=>pad.l+i*(iw/(data.length-1));
  const y=v=>pad.t+ih-(v/maxV)*ih;
  const yticks=[0,.25,.5,.75,1].map(f=>Math.round(maxV*f));
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:h,overflow:'visible'}}>
      {yticks.map(v=>(
        <g key={v}>
          <line x1={pad.l} x2={w-pad.r} y1={y(v)} y2={y(v)} stroke="var(--chart-grid)" strokeWidth="1"/>
          <text x={pad.l-6} y={y(v)+4} textAnchor="end" fontSize="10" fill="var(--text-muted)">{v}</text>
        </g>
      ))}
      {data.map((d,i)=>(
        <text key={i} x={x(i)} y={h-6} textAnchor="middle" fontSize="10" fill="var(--text-muted)">{d.wk||d.label}</text>
      ))}
      {keys.map((k,ki)=>{
        const pts=data.map((d,i)=>`${x(i)},${y(d[k]||0)}`).join(' ');
        return <polyline key={k} points={pts} fill="none" stroke={colors[ki]} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" strokeDasharray={ki===2?"4 2":undefined}/>;
      })}
      {labels&&(
        <g>{keys.map((k,ki)=>(
          <g key={k} transform={`translate(${pad.l+ki*90},${h-4})`}>
            <rect x="0" y="-6" width="14" height="2" rx="1" fill={colors[ki]}/>
            <text x="18" y="-2" fontSize="10" fill="var(--text-muted)">{labels[ki]}</text>
          </g>
        ))}</g>
      )}
    </svg>
  );
}

function SvgBar({data,h=185}){
  const w=480,pad={t:10,r:10,b:28,l:36};
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const maxV=Math.max(...data.flatMap(d=>[d.actual,d.target]),1)*1.1;
  const bw=Math.floor(iw/data.length), gap=6, grpW=bw-gap;
  const y=v=>pad.t+ih-(v/maxV)*ih;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:h}}>
      {[0,.25,.5,.75,1].map(f=>{
        const v=Math.round(maxV*f);
        return <g key={f}><line x1={pad.l} x2={w-pad.r} y1={y(v)} y2={y(v)} stroke="var(--chart-grid)" strokeWidth="1"/><text x={pad.l-6} y={y(v)+4} textAnchor="end" fontSize="10" fill="var(--text-muted)">{v}</text></g>;
      })}
      {data.map((d,i)=>{
        const cx=pad.l+i*bw+grpW/2;
        const hw=grpW/2-1;
        const th=Math.max((d.target/maxV)*ih,2), ah=Math.max((d.actual/maxV)*ih,2);
        return (
          <g key={i}>
            <rect x={cx-hw} y={y(d.target)} width={hw-1} height={th} rx="2" fill="var(--subtle)"/>
            <rect x={cx+1}  y={y(d.actual)} width={hw-1} height={ah} rx="2" fill="var(--text)"/>
            <text x={cx} y={h-6} textAnchor="middle" fontSize="10" fill="var(--text-muted)">{d.m}</text>
          </g>
        );
      })}
      <g transform={`translate(${pad.l},${h-4})`}>
        <rect x="0" y="-6" width="12" height="8" rx="1" fill="var(--subtle)"/><text x="16" y="0" fontSize="10" fill="var(--text-muted)">Target</text>
        <rect x="65" y="-6" width="12" height="8" rx="1" fill="var(--text)"/><text x="81" y="0" fontSize="10" fill="var(--text-muted)">Actual</text>
      </g>
    </svg>
  );
}

function SvgBarSingle({data,h=165}){
  const w=480,pad={t:10,r:10,b:28,l:36};
  const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  const maxV=Math.max(...data.map(d=>d.v),1)*1.1;
  const bw=Math.floor(iw/data.length)-4;
  const y=v=>pad.t+ih-(v/maxV)*ih;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:h}}>
      {[0,.5,1].map(f=>{
        const v=Math.round(maxV*f);
        return <g key={f}><line x1={pad.l} x2={w-pad.r} y1={y(v)} y2={y(v)} stroke="var(--chart-grid)" strokeWidth="1"/><text x={pad.l-6} y={y(v)+4} textAnchor="end" fontSize="10" fill="var(--text-muted)">{v}</text></g>;
      })}
      {data.map((d,i)=>{
        const cx=pad.l+i*(iw/data.length)+bw/2+2;
        const bh=Math.max((d.v/maxV)*ih,2);
        return (
          <g key={i}>
            <rect x={cx-bw/2} y={y(d.v)} width={bw} height={bh} rx="2" fill="var(--text)"/>
            <text x={cx} y={h-6} textAnchor="middle" fontSize="10" fill="var(--text-muted)">{d.wk}</text>
          </g>
        );
      })}
    </svg>
  );
}

function SvgPyramid({data,w=300,h=170,selectedStage,onSelect}){
  const ordered=[...data].reverse();
  const levels=Math.max(ordered.length,1);
  const maxW=w*.68, minW=w*.22, levelH=h/levels, pyramidCx=w*.58;
  const GRAYS=['var(--donut-5)','var(--donut-4)','var(--donut-3)','var(--donut-2)','var(--donut-1)','var(--donut-0)'];
  const selected=ordered.find(d=>d.label===selectedStage)||ordered[ordered.length-1];
  const selectedIndex=ordered.findIndex(d=>d.label===selected.label);
  const arrowY=selectedIndex*levelH+levelH/2;
  const selectedBotW=minW+(maxW-minW)*((selectedIndex+1)/levels);
  const arrowEnd=pyramidCx-selectedBotW/2-8;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:h,overflow:'visible'}}>
      <g>
        <path d={`M 22 ${arrowY} L ${arrowEnd} ${arrowY}`} stroke="var(--text)" strokeWidth="2" strokeLinecap="round"/>
        <path d={`M ${arrowEnd} ${arrowY} l -6 -5 v10 z`} fill="var(--text)"/>
        <text x="18" y={arrowY-9} textAnchor="start" fontSize="10" fontWeight="700" fill="var(--text)">{selected.v}</text>
        <text x="18" y={arrowY+14} textAnchor="start" fontSize="9" fill="var(--text-muted)">coaches</text>
      </g>
      {ordered.map((d,i)=>{
        const topW=minW+(maxW-minW)*(i/levels);
        const botW=minW+(maxW-minW)*((i+1)/levels);
        const y=i*levelH;
        const xTop=pyramidCx-topW/2, xBot=pyramidCx-botW/2;
        const isSelected=d.label===selected.label;
        return (
          <g key={d.label} onClick={()=>onSelect&&onSelect(d.label)} style={{cursor:'pointer',opacity:isSelected?1:.78}}>
            <polygon points={`${xTop},${y+2} ${xTop+topW},${y+2} ${xBot+botW},${y+levelH-2} ${xBot},${y+levelH-2}`}
              fill={GRAYS[i%GRAYS.length]} stroke={isSelected?'var(--text)':'var(--surface)'} strokeWidth={isSelected?'2.5':'2'}/>
            <text x={pyramidCx} y={y+levelH*.55} textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight="700" fill={i<2?'var(--text)':'var(--surface)'}>
              {d.label}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

// ─── REUSABLE COMPONENTS ─────────────────────
function ScoreRing({score,size=64,stroke=6}){
  const r=(size-stroke*2)/2, c=2*Math.PI*r, off=c-(score/100)*c;
  return (
    <div style={{width:size,height:size,position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',position:'absolute'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--chart-grid)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={sc(score)} strokeWidth={stroke}
          strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:'stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)'}}/>
      </svg>
      <span style={{fontSize:size<48?'11px':'13px',fontWeight:700,color:'var(--text)'}}>{score}</span>
    </div>
  );
}

function PortfolioView({coaches,setView,setClub,setCoach}){
  const [cpQ,setCpQ]=useState('');
  const cs=useMemo(()=>CLUBS.map(club=>{
    const cc=coaches.filter(c=>c.club===club);
    return {club,n:cc.length,rev:cc.reduce((s,c)=>s+c.monthly_rev,0),
      score:cc.length?Math.round(cc.reduce((s,c)=>s+c.score,0)/cc.length):0,
      risk:cc.filter(c=>c.risk==='Red').length,region:REGIONS[club]};
  }),[coaches]);
  const scored=useMemo(()=>cs.filter(s=>s.n>0).sort((a,b)=>b.score-a.score),[cs]);
  const topTier=scored.slice(0,4);
  const rest=scored.slice(4);
  const needTier=rest.length>=4?rest.slice(-4):[];
  const midTier=(rest.length>=4?rest.slice(0,rest.length-4):rest).slice(0,4);
  const searchMatches=useMemo(()=>{
    if(!cpQ)return[];
    const q=cpQ.toLowerCase();
    return cs.filter(s=>s.club.toLowerCase().includes(q)||(CLUB_NUMBERS[s.club]||'').includes(q));
  },[cs,cpQ]);
  const tot={rev:coaches.reduce((s,c)=>s+c.monthly_rev,0),
    score:Math.round(coaches.reduce((s,c)=>s+c.score,0)/coaches.length),
    red:coaches.filter(c=>c.risk==='Red').length,
    warn:coaches.filter(c=>c.risk==='Yellow').length};
  const rdist=RAMP_STAGES.map(s=>({label:s,v:coaches.filter(c=>c.ramp_stage===s).length})).filter(r=>r.v>0);
  const [selectedStage,setSelectedStage]=useState(null);
  const [activeKpi,setActiveKpi]=useState(null);
  const totRc=useMemo(()=>coaches.reduce((s,c)=>s+c.rc,0),[coaches]);
  const totAc=useMemo(()=>coaches.reduce((s,c)=>s+c.ac,0),[coaches]);
  const kpiCoaches=useMemo(()=>{
    if(activeKpi==='health')return scored.slice(0,12);
    if(activeKpi==='at-risk')return [...coaches].filter(c=>c.risk!=='Green').sort((a,b)=>a.score-b.score);
    if(activeKpi==='active')return [...coaches].sort((a,b)=>b.score-a.score).slice(0,24);
    if(activeKpi==='recurring')return [...coaches].filter(c=>c.rc>0).sort((a,b)=>b.rc-a.rc).slice(0,24);
    return [];

  const selectedRamp=rdist.find(r=>r.label===selectedStage)||rdist[rdist.length-1];
  const rampCoaches=coaches.filter(c=>c.ramp_stage===(selectedRamp?.label||selectedStage));

            <div style={{fontSize:'10px',padding:'2px 8px',background:'#FEF2F2',color:'#DC2626',borderRadius:20,fontWeight:600}}>{coaches.filter(c=>c.risk!=='Green').length} coaches</div>

      </div>

}

// ─── CLUB SEARCH DROPDOWN ─────────────────────
function ClubSearchDropdown({club,setClub}){
  const [query,setQuery]=useState('');
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  const filtered=useMemo(()=>{
    const q=query.toLowerCase().trim();
    if(!q)return CLUBS;
    return CLUBS.filter(cl=>cl.toLowerCase().includes(q)||CLUB_NUMBERS[cl].includes(q));
  },[query]);
  useEffect(()=>{
    function handler(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);
  return(
    <div ref={ref} style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
      <label style={{fontSize:'9px',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)'}}>Club Search</label>
      <div style={{position:'relative',width:240}}>
        <input value={open?query:`${club} · ${CLUB_NUMBERS[club]}`}
          onFocus={()=>{setOpen(true);setQuery('');}}
          onChange={e=>setQuery(e.target.value)}
          placeholder="Type name or number…"
          style={{width:'100%',padding:'8px 30px 8px 10px',border:'1px solid var(--border)',borderRadius:7,fontSize:'12px',outline:'none',color:'var(--text-sec)',background:'var(--surface)',cursor:'pointer'}}/>
        <svg width="13" height="13" fill="none" stroke="var(--text-muted)" strokeWidth="2" viewBox="0 0 24 24" style={{position:'absolute',right:9,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}>
          <path d="M6 9l6 6 6-6"/>
        </svg>
        {open&&(
          <div style={{position:'absolute',top:'calc(100% + 4px)',right:0,width:260,maxHeight:280,overflowY:'auto',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:9,zIndex:200,boxShadow:'0 6px 20px rgba(0,0,0,.10)'}}>
            {filtered.length===0
              ?<div style={{padding:'12px',fontSize:'11px',color:'var(--text-muted)'}}>No clubs found</div>
              :filtered.map(cl=>(
                <div key={cl} onMouseDown={()=>{setClub(cl);setOpen(false);setQuery('');}}
                  style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',cursor:'pointer',fontSize:'12px',color:'var(--text)',background:cl===club?'var(--subtle)':'transparent'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--subtle)'}
                  onMouseLeave={e=>e.currentTarget.style.background=cl===club?'var(--subtle)':'transparent'}>
                  <span>{cl}</span>
                  <span style={{fontSize:'10px',color:'var(--text-muted)',marginLeft:8}}>#{CLUB_NUMBERS[cl]}</span>
                </div>
              ))
            }
          </div>
        )}
      </div>
      <div style={{fontSize:'10px',color:'var(--text-muted)'}}>Selected club #{CLUB_NUMBERS[club]}</div>
    </div>
  );
}

// ─── CLUB VIEW ────────────────────────────────
function ClubView({all,club,setClub,setCoach,setView}){
  const [sf,setSf]=useState('All');
  const [q,setQ]=useState('');
  const coaches=useMemo(()=>all.filter(c=>c.club===club&&(sf==='All'||c.ramp_stage===sf)&&(!q||c.name.toLowerCase().includes(q.toLowerCase()))),[all,club,sf,q]);
  const totRev=coaches.reduce((s,c)=>s+c.monthly_rev,0);
  const avgScore=coaches.length?Math.round(coaches.reduce((s,c)=>s+c.score,0)/coaches.length):0;
  const trendData=useMemo(()=>{
    const cc=all.filter(c=>c.club===club);
    return Array.from({length:8},(_,wi)=>({wk:'W'+(wi+1),
      eq_c:Math.round(cc.reduce((s,c)=>s+(c.hist[wi]?.eq_c||0),0)/Math.max(cc.length,1)*10)/10,
      cpt: Math.round(cc.reduce((s,c)=>s+(c.hist[wi]?.cpt||0),0)/Math.max(cc.length,1)*10)/10,
      conv:Math.round(cc.reduce((s,c)=>s+(c.hist[wi]?.conv||0),0)/Math.max(cc.length,1)*10)/10}));
  },[all,club]);
  const funnel=[
    {stage:'Equifits Booked',   v:coaches.reduce((s,c)=>s+c.eq_b,0)},
    {stage:'Equifits Completed',v:coaches.reduce((s,c)=>s+c.eq_c,0)},
    {stage:'CPTs Completed',    v:coaches.reduce((s,c)=>s+c.cpt,0)},
    {stage:'New Conversions',   v:coaches.reduce((s,c)=>s+c.conv,0)},
  ];
  return (
    <div className="fade-in" style={{padding:'28px',maxWidth:1300,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Club View</div>
          <h1 style={{fontSize:'24px',fontWeight:700,color:'var(--text)',letterSpacing:'-.02em'}}>PT Department · {club}</h1>
          <div style={{fontSize:'12px',color:'var(--text-muted)',marginTop:4}}>{REGIONS[club]} · PTM: {PTMS[club]||'—'} · Avg Score: {avgScore}</div>
        </div>
        <ClubSearchDropdown club={club} setClub={setClub}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:18}}>
        <KCard label="Coaches"           value={coaches.length}/>
        <KCard label="Active Clients"    value={coaches.reduce((s,c)=>s+c.ac,0)}/>
        <KCard label="Recurring Clients" value={coaches.reduce((s,c)=>s+c.rc,0)} sub={(()=>{const ac=coaches.reduce((s,c)=>s+c.ac,0);return ac>0?fp(coaches.reduce((s,c)=>s+c.rc,0)/ac)+' of active':''})()}/>
        <KCard label="Club Health Score" value={avgScore} sub={sl(avgScore)}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:14,marginBottom:18}}>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'20px'}}>
          <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Weekly Performance Trend (avg per coach)</div>
          <SvgLine data={trendData} keys={['eq_c','cpt','conv']} colors={['var(--chart-bar)','var(--chart-bar-2)','var(--chart-bar-3)']} h={190} labels={['Equifits','CPTs','Conversions']}/>
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'20px'}}>
          <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Pipeline Funnel</div>
          {funnel.map((f,i)=>{
            const p=i===0?100:Math.round(f.v/Math.max(funnel[0].v,1)*100);
            return (
              <div key={f.stage} style={{marginBottom:13}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:'11px',color:'var(--text-2)'}}>{f.stage}</span>
                  <div style={{display:'flex',gap:7}}><span style={{fontSize:'12px',fontWeight:700,color:'var(--text)'}}>{f.v}</span>{i>0&&<span style={{fontSize:'10px',color:'var(--text-muted)'}}>{p}%</span>}</div>
                </div>
                <div style={{height:5,background:'var(--subtle)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:p+'%',borderRadius:3,transition:'width .6s ease',background:['var(--chart-bar)','var(--chart-bar)','var(--chart-bar-2)','var(--text-muted)'][i]}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--subtle)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)'}}>Coach Performance</div>
          <div style={{display:'flex',gap:8}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search coaches…"

            <select value={sf} onChange={e=>setSf(e.target.value)}

                  <td style={{padding:'9px 10px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:5}}>
                      <div style={{width:6,height:6,borderRadius:'50%',background:rd(c.risk)}}/>
                      <span style={{fontSize:'10px',color:'var(--text-2)',whiteSpace:'nowrap'}}>{dg.label}</span>
                    </div>
                  </td>
                  <td style={{padding:'9px 10px'}}>
                    <svg width="13" height="13" fill="none" stroke="var(--text-dim)" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── COACH VIEW ───────────────────────────────
function CoachView({coach,all,setCoach,setView,setClub,periodIdx=PAY_PERIODS.length-1,setPeriodIdx}){
  const [tab,setTab]=useState('overview');
  if(!coach){
    return (
      <div className="fade-in" style={{padding:'28px',maxWidth:1300,margin:'0 auto'}}>
        <div style={{marginBottom:22}}>
          <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:4}}>Individual</div>

        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
          {all.map(c=>(
            <button key={c.id} onClick={()=>{setCoach(c);setView('coach');}}
              style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'14px',cursor:'pointer',textAlign:'left',transition:'box-shadow .12s'}}
              onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,.06)'}
              onMouseLeave={e=>e.currentTarget.style.boxShadow='none'}>
              <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
                <Av name={c.name} size={34}/>
                <div><div style={{fontSize:'13px',fontWeight:600,color:'var(--text)'}}>{c.name}</div><div style={{fontSize:'11px',color:'var(--text-muted)'}}>{c.club}</div></div>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontSize:'10px',padding:'2px 6px',background:'var(--subtle)',borderRadius:4,color:'var(--text-sec)',fontWeight:500}}>{c.ramp_stage}</span>
                <ScoreRing score={c.score} size={34} stroke={3}/>
              </div>
            </button>
          ))}
        </div>
      </div>
    );
  }
  const dg=diagnose(coach), rec=recommend(coach), b=BENCHMARKS[coach.ramp_stage];
  const pd=coach.hist&&coach.hist[periodIdx]?coach.hist[periodIdx]:{sess:coach.sess||0,eq_c:coach.eq_c||0,cpt:coach.cpt||0,eq_b:coach.eq_b||0,fu:coach.fu||0};
  const comp=calcPay(coach.tier,pd.sess||0,pd.eq_c||0,pd.cpt||0);
  const nextRate=getNextRate(coach.tier,pd.sess||0);
  const periodLabel=PAY_PERIODS[periodIdx]||'Current';
  const periodSessions=Math.floor(pd.sess||0);
  const tierTable=RATE_TABLE[coach.tier]||RATE_TABLE['Coach'];
  const currentBracket=tierTable.find(bk=>periodSessions>=bk.lo&&(bk.hi===Infinity||periodSessions<=bk.hi))||tierTable[tierTable.length-1];
  const bracketLabel=currentBracket.hi===Infinity?'65+':currentBracket.lo+'-'+currentBracket.hi;
  const TABS=[{id:'overview',l:'Overview'},{id:'process',l:'Activity'},{id:'trends',l:'Trends'},{id:'coaching',l:'Coaching'},{id:'assess',l:'Self-Assessment'}];
  const diagBg=dg.col==='green'?'#F0FDF4':dg.col==='amber'?'#FFFBEB':'#FEF2F2';
  const diagBdr=dg.col==='green'?'#BBF7D0':dg.col==='amber'?'#FDE68A':'#FECACA';
  const diagTx=dg.col==='green'?'#16A34A':dg.col==='amber'?'#D97706':'#DC2626';
  return (
    <div className="fade-in" style={{padding:'28px',maxWidth:1300,margin:'0 auto'}}>
      <button onClick={()=>{setView('club');setClub(coach.club);}}
        style={{display:'flex',alignItems:'center',gap:5,fontSize:'12px',color:'var(--text-muted)',background:'none',border:'none',cursor:'pointer',marginBottom:10}}>
        <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        {coach.club}
      </button>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <Av name={coach.name} size={48}/>
          <div>
            <h1 style={{fontSize:'22px',fontWeight:700,color:'var(--text)',letterSpacing:'-.02em'}}>{coach.name}</h1>
            <div style={{fontSize:'12px',color:'var(--text-muted)',marginTop:3}}>{coach.ramp_stage} · {coach.tier} · {coach.club} · PTM: {coach.ptm||'—'}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <ScoreRing score={coach.score} size={60} stroke={6}/>
          <div style={{padding:'9px 13px',background:diagBg,border:'1px solid '+diagBdr,borderRadius:8}}>
            <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:diagTx}}>{dg.label}</div>
            <div style={{display:'flex',gap:6,marginTop:4,alignItems:'center'}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:rd(coach.risk)}}/>
              <span style={{fontSize:'11px',color:'var(--text-2)'}}>{coach.risk} Risk</span>
            </div>
          </div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <span style={{fontSize:'10px',fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-muted)',flexShrink:0}}>Pay Period</span>
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {PAY_PERIODS.map((p,i)=>(
            <button key={p} onClick={()=>setPeriodIdx&&setPeriodIdx(i)}
              style={{padding:'3px 10px',fontSize:'11px',fontWeight:i===periodIdx?600:400,
                background:i===periodIdx?'var(--text)':'var(--subtle)',
                color:i===periodIdx?'var(--surface)':'var(--text-2)',
                border:'1px solid '+(i===periodIdx?'var(--text)':'var(--border)'),
                borderRadius:20,cursor:'pointer',transition:'all .1s',lineHeight:'18px'}}>
              {p}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:20}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:'7px 14px',fontSize:'12px',fontWeight:tab===t.id?600:400,color:tab===t.id?'var(--text)':'var(--text-muted)',
              background:'none',border:'none',cursor:'pointer',borderBottom:tab===t.id?'2px solid var(--text)':'2px solid transparent',marginBottom:-1,transition:'all .12s'}}>
            {t.l}
          </button>
        ))}
      </div>

      {tab==='overview'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:18}}>
            <BCard label="Production" score={coach.prod} weight="50%"
              metrics={[{l:'Pay Period Pay',v:'$'+comp.pay.toLocaleString()},{l:'Active Clients',v:coach.ac,b:b.ac},{l:'Sessions / Pay Period',v:pd.sess,b:b.sess},{l:'Unlocked Session Rate',v:'$'+comp.rate.toFixed(2)},{l:'Equifits Completed',v:pd.eq_c},{l:'CPTs Completed',v:pd.cpt}]}/>
            <BCard label="Process" score={coach.proc} weight="30%"
              metrics={[{l:'Equifits Completed',v:coach.eq_c,b:b.eq_c},{l:'CPTs Completed',v:coach.cpt,b:b.cpts},{l:'Follow-Ups',v:coach.fu,b:b.fu},{l:'Equifits Booked',v:coach.eq_b,b:b.eq_b}]}/>
            <BCard label="Persistence" score={coach.pers} weight="20%"
              metrics={[{l:'Recurring Clients',v:coach.rc,b:Math.round(b.ac*b.rec_pct)},{l:'Recurring %',v:fp(coach.rec_pct),b:fp(b.rec_pct)},{l:'Client Retention',v:fp(coach.retention)},{l:'Session Confirm',v:fp(coach.confirm)}]}/>
          </div>
          {/* ── COMPENSATION MODULE ── */}
          <div style={{marginBottom:14,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'20px 24px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
              <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)'}}>Current Pay Period Compensation</div>
              <span style={{fontSize:'11px',color:'var(--text-2)',background:'var(--subtle)',padding:'2px 10px',borderRadius:20,fontWeight:500,border:'1px solid var(--border)'}}>{periodLabel}</span>
            </div>
            {/* Top stat row */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:18}}>
              <div style={{background:'var(--subtle)',borderRadius:9,padding:'13px 15px'}}>
                <div style={{fontSize:'9px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:5}}>Tier</div>
                <div style={{fontSize:'16px',fontWeight:700,color:'var(--text)'}}>{coach.tier}</div>
              </div>
              <div style={{background:'var(--subtle)',borderRadius:9,padding:'13px 15px'}}>
                <div style={{fontSize:'9px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:5}}>Session Rate</div>
                <div style={{fontSize:'16px',fontWeight:700,color:'var(--text)'}}>${comp.rate.toFixed(2)}</div>
                <div style={{fontSize:'10px',color:'var(--text-2)',marginTop:2}}>{periodSessions} sessions · {bracketLabel} bracket</div>
              </div>
              <div style={{background:'var(--text)',borderRadius:9,padding:'13px 15px'}}>
                <div style={{fontSize:'9px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--surface)',opacity:.7,marginBottom:5}}>Est. Pay Period Payout</div>
                <div style={{fontSize:'20px',fontWeight:700,color:'var(--surface)'}}>${comp.pay.toLocaleString()}</div>
              </div>
            </div>
            {/* Pay breakdown */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20,paddingBottom:20,borderBottom:'1px solid var(--border)'}}>
              {[
                {label:'Sessions',count:pd.sess,rate:comp.rate,total:Math.round((pd.sess||0)*comp.rate)},
                {label:'Equifits',count:pd.eq_c,rate:25,total:(pd.eq_c||0)*25},

                <div key={item.label} style={{padding:'10px 0'}}>

                    </span>
                    <span style={{fontSize:'11px',color:'var(--text-muted)',fontWeight:500}}>{periodSessions} / {nextRate.at}</span>
                  </div>
                  <div style={{height:5,background:'var(--subtle)',borderRadius:3,overflow:'hidden',marginBottom:14}}>
                    <div style={{height:'100%',background:'var(--text)',borderRadius:3,transition:'width .6s ease',
                      width:Math.min(((periodSessions-nextRate.currentLo)/Math.max(nextRate.at-nextRate.currentLo,1))*100,100)+'%'}}/>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:4}}>
                    {(RATE_TABLE[coach.tier]||RATE_TABLE['Coach']).map((bracket,i)=>{
                      const isCurrent=periodSessions>=bracket.lo&&(bracket.hi===Infinity||periodSessions<=bracket.hi);
                      const isUnlocked=bracket.hi!==Infinity&&periodSessions>bracket.hi;
                      return (
                        <div key={i} style={{textAlign:'center',padding:'6px 4px',borderRadius:6,
                          background:isCurrent?'var(--text)':isUnlocked?'var(--subtle)':'transparent',
                          border:'1px solid '+(isCurrent?'var(--text)':isUnlocked?'var(--border)':'var(--subtle)')}}>
                          <div style={{fontSize:'8px',fontWeight:600,color:isCurrent?'var(--surface)':isUnlocked?'var(--text-muted)':'var(--text-dim)',marginBottom:2}}>

              ):(
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'var(--subtle)',borderRadius:8,marginBottom:14}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:'#16A34A',flexShrink:0}}/>
                    <span style={{fontSize:'12px',color:'var(--text-sec)'}}>Maximum rate achieved — <strong>${comp.rate.toFixed(2)}/session</strong> (65+ sessions)</span>

                  <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:4}}>
                    {(RATE_TABLE[coach.tier]||RATE_TABLE['Coach']).map((bracket,i)=>(
                      <div key={i} style={{textAlign:'center',padding:'6px 4px',borderRadius:6,
                        background:bracket.hi===Infinity?'var(--text)':'var(--subtle)',
                        border:'1px solid '+(bracket.hi===Infinity?'var(--text)':'var(--border)')}}>
                        <div style={{fontSize:'8px',fontWeight:600,color:bracket.hi===Infinity?'var(--surface)':'var(--text-muted)',marginBottom:2}}>
                          {bracket.hi===Infinity?'65+':bracket.lo+'-'+bracket.hi}
                        </div>
                        <div style={{fontSize:'9px',fontWeight:700,color:bracket.hi===Infinity?'var(--surface)':'var(--text-sec)'}}>
                          ${bracket.r}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
          {/* ── KPI STRIP ── */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10}}>
            <KCard label="Active Clients"   value={coach.ac}/>
            <KCard label="Recurring"        value={coach.rc+' / '+coach.ac} sub={fp(coach.rec_pct)}/>
            <KCard label="Avg Program" value={coach.pkg+'pk'}/>
            <KCard label="Calendar Util"    value={fp(coach.cal_util)}/>
            <KCard label="Session Confirm"  value={fp(coach.confirm)}/>
          </div>
        </div>
      )}

      {tab==='process'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
            <KCard label="Equifits Booked"    value={coach.eq_b+' / '+b.eq_b}  sub="vs benchmark"/>

            <KCard label="CPTs Completed"     value={coach.cpt+' / '+b.cpts}   sub="vs benchmark"/>

                {m:'CPTs',      actual:coach.cpt,  target:Math.max(b.cpts,1)},

              {[{l:'Equifit Conversion',v:coach.eq_conv,t:.65},{l:'CPT Close Rate',v:coach.cpt_rate,t:.55},{l:'Client Retention',v:coach.retention,t:.85},{l:'Session Confirm',v:coach.confirm,t:.90},{l:'Calendar Util',v:coach.cal_util,t:.80}].map(r=>{
                const good=r.v>=r.t;
                return (
                  <div key={r.l} style={{marginBottom:13}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                      <span style={{fontSize:'11px',color:'var(--text-sec)'}}>{r.l}</span>
                      <div style={{display:'flex',gap:6}}><span style={{fontSize:'12px',fontWeight:700,color:good?'#16A34A':'#DC2626'}}>{fp(r.v)}</span><span style={{fontSize:'10px',color:'var(--text-muted)'}}>/ {fp(r.t)}</span></div>
                    </div>
                    <div style={{height:4,background:'var(--subtle)',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',background:good?'#16A34A':'#EF4444',width:Math.min(r.v*100,100)+'%',borderRadius:2,transition:'width .6s ease'}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {tab==='trends'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'20px'}}>
            <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Revenue Trend</div>
            <SvgLine data={coach.hist.map(h=>({...h,wk:h.wk}))} keys={['rev']} colors={['var(--chart-bar)']} h={165}/>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'20px'}}>
            <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Session Volume</div>
            <SvgLine data={coach.hist} keys={['sess']} colors={['var(--chart-bar)']} h={165}/>

          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'20px'}}>

            <SvgLine data={coach.hist} keys={['eq_c','cpt']} colors={['var(--chart-bar)','var(--chart-bar-2)']} h={165} labels={['Equifits','CPTs']}/>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'20px'}}>
            <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Client Conversions</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'24px'}}>

                <div key={s.l} style={{textAlign:'center',padding:'12px 8px',background:'var(--subtle)',borderRadius:8}}>
                  <ScoreRing score={s.v} size={42} stroke={4}/>
                  <div style={{fontSize:'9px',color:'var(--text-muted)',marginTop:5,textTransform:'uppercase',letterSpacing:'.07em'}}>{s.l}</div>

            <div style={{fontSize:'10px',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:14}}>Recommendations</div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:'9px',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'#16A34A',marginBottom:8}}>Wins</div>

                  <span style={{fontSize:'12px',color:'var(--text-sec)'}}>{w}</span>

              <div style={{fontSize:'9px',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'#D97706',marginBottom:8}}>Opportunities</div>
              {rec.opps.map((o,i)=>(
                <div key={i} style={{display:'flex',gap:7,marginBottom:5}}>
                  <span style={{color:'#D97706',flexShrink:0,fontSize:'12px'}}>→</span>
                  <span style={{fontSize:'12px',color:'var(--text-sec)'}}>{o}</span>
                </div>
              ))}
            </div>
            <div style={{background:'var(--subtle)',borderRadius:8,padding:'12px 14px'}}>
              <div style={{fontSize:'9px',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:5}}>Recommended Focus</div>
              <div style={{fontSize:'13px',fontWeight:700,color:'var(--text)',marginBottom:5}}>{rec.focus}</div>
              <div style={{fontSize:'12px',color:'var(--text-2)',lineHeight:1.55}}>{rec.action}</div>
            </div>
          </div>
        </div>
      )}

      {tab==='assess'&&(
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'40px',textAlign:'center'}}>
          <div style={{width:44,height:44,borderRadius:10,background:'var(--subtle)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
            <svg width="20" height="20" fill="none" stroke="var(--text-muted)" strokeWidth="1.5" viewBox="0 0 24 24">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2M12 12h.01M12 16h.01"/>
            </svg>
          </div>
          <div style={{fontSize:'16px',fontWeight:700,color:'var(--text)',marginBottom:7}}>Self-Assessment Integration</div>
          <div style={{fontSize:'13px',color:'var(--text-2)',lineHeight:1.6,maxWidth:380,margin:'0 auto 22px'}}>
            Weekly self-assessments will appear here after integration. This layer overlays subjective signals on Salesforce KPIs to support richer PDM conversations.
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,maxWidth:560,margin:'0 auto'}}>
            {['Confidence','Biggest Challenge','Coaching Focus','Energy Level','Self-Rated Score'].map(f=>(
              <div key={f} style={{background:'var(--subtle)',border:'1px dashed var(--border)',borderRadius:8,padding:'12px 8px'}}>
                <div style={{fontSize:'9px',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.07em',textAlign:'center'}}>{f}</div>
                <div style={{fontSize:'12px',color:'var(--text-dim)',marginTop:5,textAlign:'center'}}>—</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────
function App(){
  const [view,setView]=useState('portfolio');
  const [club,setClub]=useState(CLUBS[0]);
  const [coach,setCoach]=useState(null);
  const [dark,setDark]=useState(false);
  const [periodIdx,setPeriodIdx]=useState(PAY_PERIODS.length-1);
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  },[dark]);
  function nav(id){setView(id);if(id!=='coach')setCoach(null);}
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'var(--app-bg)'}}>
      <Sidebar view={view} onNav={nav} dark={dark} onToggleTheme={()=>setDark(d=>!d)}/>
      <main style={{marginLeft:196,flex:1,overflowY:'auto'}}>
        {view==='portfolio'&&<PortfolioView coaches={COACHES} setView={setView} setClub={setClub} setCoach={setCoach}/>}
        {view==='club'&&<ClubView all={COACHES} club={club} setClub={setClub} setCoach={setCoach} setView={setView}/>}
        {view==='coach'&&<CoachView coach={coach} all={COACHES} setCoach={setCoach} setView={setView} setClub={setClub} periodIdx={periodIdx} setPeriodIdx={setPeriodIdx}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
